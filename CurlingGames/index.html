<!DOCTYPE html>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }

    h1, h2 {
      margin-top: 0;
    }

    /* GRID LAYOUT */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    /* CARD STYLES */
    .card {
      background: white;
      padding: 12px 14px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      font-size: 0.95rem;
    }

    .current-game {
      border-left: 5px solid #43a047;
    }

    .next-game {
      border-left: 5px solid #1e88e5;
    }

    .past-game {
      border-left: 5px solid #9e9e9e;
      opacity: 0.85;
    }

    .game-time {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .event {
      font-style: bold;
      color: #0F0F0F;
      margin-bottom: 4px;
    }

    .stream a {
      color: #1e88e5;
      text-decoration: none;
    }

    .result {
      margin-top: 6px;
      font-weight: bold;
    }

    .empty {
      color: #777;
      font-style: italic;
    }
  </style>
</head>

        event: "April Spiel",
        stream: "https://youtube.com/@curlingseattlelive?si=nL2y65L91iCsb5zX",
        result: ""
      },
    ];

    const now = new Date();
    const THREE_HOURS = 2.5 * 60 * 60 * 1000;

    games.sort((a, b) => new Date(a.date) - new Date(b.date));

    let currentGame = null;
    const futureGames = [];
    const pastGames = [];

    games.forEach(game => {
      const start = new Date(game.date);
      const diff = now - start;

      if (diff >= 0 && diff <= THREE_HOURS) {
        currentGame = game;
      } else if (start > now) {
        futureGames.push(game);
      } else {
        pastGames.push(game);
      }
    });

    const nextGame = futureGames[0];
    const upcomingGames = futureGames.slice(1);

    function renderGame(game, type = "") {
      const date = new Date(game.date);
      return `
        <div class="card ${type}">
          <div class="game-time">
            ${date.toLocaleDateString()}<br>
            ${date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
          </div>
          <div class="event">🏆 ${game.event}</div>
          <div>📍 ${game.location}</div>

          ${type === "next-game" || type === "current-game" ? `
            <div class="stream">
              ${game.stream
                ? `📺 <a href="${game.stream}" target="_blank">Stream</a>`
                : "📺 No stream"}
            </div>
          ` : ""}

          ${type === "past-game" ? `
            <div class="result">
              🏁 ${game.result || "No result"}
            </div>
          ` : ""}
        </div>
      `;
    }

    document.getElementById("current-game").innerHTML =
      currentGame
        ? renderGame(currentGame, "current-game")
        : `<div class="empty">No game in progress.</div>`;

    document.getElementById("next-game").innerHTML =
      nextGame
        ? renderGame(nextGame, "next-game")
        : `<div class="empty">No upcoming games.</div>`;

    document.getElementById("upcoming-games").innerHTML =
      upcomingGames.length
        ? upcomingGames.map(g => renderGame(g)).join("")
        : `<div class="empty">No additional upcoming games.</div>`;

    document.getElementById("past-games").innerHTML =
      pastGames.length
        ? pastGames.reverse().map(g => renderGame(g, "past-game")).join("")
        : `<div class="empty">No past games yet.</div>`;
  </script>
